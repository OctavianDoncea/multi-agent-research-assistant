name: CI

on:
  push:
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: multi-agent_test
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/multi-agent_test
      LLM_PRIMARY: ollama
      LLM_FALLBACK: ollama
      OLLAMA_BASE_URL: http://localhost:11434/v1
      OLLAMA_API_KEY: ollama
      OLLAMA_MODEL: llama3.1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        working-directory: backend
        run: |
          python -m alembic -c alembic.ini upgrade head

      - name: Run tests
        working-directory: backend
        run: |
          pytest -q