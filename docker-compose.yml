services:
  db:
    image: postgres:16
    container_name: multi-agent_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - multi-agent_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d multi-agent"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: multi-agent-backend
    env_file:
      - ./.env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      OLLAMA_BASE_URL: http://ollama:11434/v1
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
        required: false

  frontend:
    build:
      context: ./frontend
    container_name: multi-agent-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
  
  ollama:
    image: ollama/ollama:latest
    container_name: mara-ollama
    ports:
      - '11434:11434'
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped
    profiles: ["ollama"]

networks:
  default:
    driver: bridge

volumes:
  multi-agent_pgdata:
  ollama: